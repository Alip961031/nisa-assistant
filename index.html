    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {

            background: #050814;
            min-height: 100vh;

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        @keyframes cardGlide {
            0% { opacity: 0; transform: translateY(40px) scale(0.9); filter: blur(12px); }
            60% { opacity: 1; transform: translateY(-5px) scale(1.02); filter: blur(0); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes particleFade {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        @keyframes orbGlow {
            0% { opacity: 0; transform: rotateY(90deg) scale(0.5); filter: blur(4px); }
            100% { opacity: 1; transform: rotateY(0) scale(1); filter: blur(0); }
        }
        .portal-info {
            position: relative;
            z-index: 2;
            max-width: 750px;
            width: 90%;
            margin: 80px auto;
            background: rgba(20, 25, 50, 0.45);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 40px 40px 50px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3), 0 0 0 1px rgba(0,150,255,0.2);
            border: 1px solid rgba(0,150,255,0.4);
            transition: all 0.4s ease;
            text-align: center;
            opacity: 0;
            transform: translateY(40px) scale(0.9);
            filter: blur(12px);
            animation: cardGlide 0.9s cubic-bezier(0.2, 0.9, 0.3, 1.1) forwards;
        }
        .portal-info:hover {
            box-shadow: 0 30px 60px rgba(0,102,204,0.3);
            border-color: rgba(0,200,255,0.7);
        }
        .character-area {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            height: 180px;
            animation: orbGlow 1s ease-out forwards;
        }
        #three-character {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,150,255,0.3);
            background: radial-gradient(circle at 30% 30%, rgba(0,150,255,0.1), rgba(0,0,0,0.2));
        }
        .badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(0,102,204,0.3);
            color: #88ff88;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(0,255,100,0.5);
            margin-bottom: 16px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards;
            animation-delay: 0.2s;
        }
        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #88ddff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0 0 12px;
            letter-spacing: -0.5px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards;
            animation-delay: 0.3s;
        }
        .tagline {
            font-size: 1.1rem;
            color: #cceeff;
            margin-bottom: 28px;
            opacity: 0.9;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards;
            animation-delay: 0.4s;
        }
        .tagline strong {
            color: #ffffff;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .api-info {
            background: rgba(0,0,0,0.3);
            border-radius: 28px;
            padding: 18px 24px;
            margin: 28px 0 0;
            font-size: 14px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0,150,255,0.2);
            text-align: center;
            color: #cceeff;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards;
            animation-delay: 0.5s;
        }
        .api-info strong { color: #88ddff; }
        .api-info .highlight {
            font-weight: 700;
            background: linear-gradient(120deg, #ffd966, #ffaa33);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.05em;
        }
        .particle {
            position: fixed;
            background: rgba(0,150,255,0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle 12s infinite ease-in-out, particleFade 1s ease forwards;
            z-index: 1;
            opacity: 0;
        }
        @keyframes floatParticle {
            0% { transform: translateY(0px) translateX(0px) scale(1); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { transform: translateY(-200px) translateX(80px) scale(0); opacity: 0; }
        }
        #chatbot-widget-host {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 999999;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            animation: fadeInScale 0.8s ease forwards;
            animation-delay: 0.6s;
            opacity: 0;
            transform: scale(0.8);
        }

 /* Hide floating trigger during fullscreen */
 .chatbot-trigger-container.fullscreen-hidden {
     display: none !important;
 }

 .chatbot-trigger-container {
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .chatbot-trigger-label {
            background: rgba(0,102,204,0.7);
            backdrop-filter: blur(12px);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            color: white;
            letter-spacing: 0.5px;
            border: 1px solid rgba(0,200,255,0.5);
            box-shadow: 0 0 10px rgba(0,150,255,0.3);
            white-space: nowrap;
            pointer-events: none;
            transition: all 0.3s ease;
        }
        .chatbot-trigger {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: linear-gradient(135deg, #0066CC, #00aaff);
            border: none;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0,150,255,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 1001;
        }
        .chatbot-trigger:hover {
            transform: scale(1.08);
            box-shadow: 0 0 25px rgba(0,200,255,0.9);
        }
        .chatbot-trigger svg {
            width: 32px;
            height: 32px;
            filter: drop-shadow(0 0 3px white);
        }
        .chatbot-trigger .close-icon { display: none; }
        .chatbot-trigger.open .chat-icon { display: none; }
        .chatbot-trigger.open .close-icon { display: block; }

        .chatbot-window {
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 400px;
            max-width: calc(100vw - 40px);
            max-height: 80vh;
            background: rgba(20, 25, 50, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,150,255,0.3);
            border: 1px solid rgba(0,200,255,0.4);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            opacity: 0;
            visibility: hidden;
            transform: translateY(30px) rotateX(10deg) scale(0.9);
            transform-origin: bottom right;
            z-index: 10001;
        }
        .chatbot-window.open {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) rotateX(0) scale(1);
        }
        .chatbot-window.poof {
            animation: poofEffect 0.4s forwards ease-out;
        }
        @keyframes poofEffect {
            0% { transform: scale(1); opacity: 1; filter: blur(0); }
            100% { transform: scale(0.2); opacity: 0; filter: blur(4px); visibility: hidden; }
        }
        .smoke-particle {
            position: fixed;
            pointer-events: none;
            background: radial-gradient(circle, rgba(180,180,200,0.6), rgba(100,100,120,0));
            border-radius: 50%;
            filter: blur(8px);
            z-index: 10002;
            animation: smokeRise 1s ease-out forwards;
        }
        @keyframes smokeRise {
            0% { transform: translateY(0) scale(0.5); opacity: 0.7; }
            100% { transform: translateY(-80px) scale(2); opacity: 0; }
        }
        .chatbot-messages::-webkit-scrollbar { width: 4px; }
        .chatbot-messages::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .chatbot-messages::-webkit-scrollbar-thumb { background: #00aaff; border-radius: 10px; }
        .chatbot-messages::-webkit-scrollbar-thumb:hover { background: #0088cc; }
        .chatbot-header {
            background: rgba(0,102,204,0.7);
            backdrop-filter: blur(10px);
            color: white;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,200,255,0.3);
            flex-shrink: 0;
        }
        .chatbot-header-info { display: flex; align-items: center; gap: 12px; }
        .chatbot-avatar {
            width: 36px; height: 36px; background: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .chatbot-avatar svg { width: 24px; height: 24px; fill: #0066CC; }
        .chatbot-header-text h3 { margin: 0; font-size: 1rem; font-weight: 600; }
        .chatbot-header-text p { margin: 0; font-size: 0.7rem; opacity: 0.8; }
        .chatbot-header-actions { display: flex; gap: 8px; }
        .chatbot-header-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            border-radius: 20px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: 0.2s;
        }
        .chatbot-header-btn:hover { background: rgba(255,255,255,0.3); }
        .chatbot-header-btn svg { fill: white; width: 14px; height: 14px; }
        .chatbot-status {
            background: rgba(0,0,0,0.4);
            font-size: 11px;
            padding: 4px 12px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: #bbffbb;
            flex-shrink: 0;
        }
        .chatbot-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(0,0,0,0.2);
            min-height: 0;
        }
        .chatbot-message { display: flex; flex-direction: column; max-width: 85%; }

 .chatbot-message {
 animation: nisaMessageIn 0.34s cubic-bezier(.2,.85,.25,1.15) both;
 transform-origin: bottom left;
 }
 .chatbot-message.user {
 transform-origin: bottom right;
 }
 .chatbot-message .chatbot-bubble {
 animation: nisaBubblePop 0.30s cubic-bezier(.2,.85,.25,1.08) both;
 }
 .chatbot-message.assistant .chatbot-bubble {
 box-shadow: 0 10px 28px rgba(0, 170, 255, 0.08), inset 0 1px 0 rgba(255,255,255,0.08);
 }
 @keyframes nisaMessageIn {
 0% { opacity: 0; transform: translateY(12px) scale(.975); filter: blur(5px); }
 60% { opacity: 1; transform: translateY(-1px) scale(1.01); filter: blur(0); }
 100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
 }
 @keyframes nisaBubblePop {
 0% { opacity: 0; transform: scale(.96); }
 100% { opacity: 1; transform: scale(1); }
 }

        .chatbot-message.assistant { align-self: flex-start; }
        .chatbot-message.user { align-self: flex-end; }
        .chatbot-message.system { align-self: center; max-width: 90%; }
        .chatbot-message.system .chatbot-bubble {
            background: rgba(0,0,0,0.6);
            color: #ffcc80;
            
            text-align: center;
        }
        .chatbot-bubble {
            background: rgba(255,255,255,0.15);

        .user .chatbot-bubble {
            background: #0066CC;
            border: none;

        }
        .chatbot-timestamp { font-size: 10px; color: #aaa; margin-top: 4px; margin-left: 8px; }

        /* NISA paper-roll guide cards: one compact image card per chat bubble */
        .chatbot-message.assistant.nisa-guide-message { max-width: 280px; }
        .chatbot-message.assistant.nisa-guide-message .chatbot-bubble { padding: 8px; overflow: hidden; }
        .nisa-paper-roll-guide-card { width: 100%; max-width: 248px; display: flex; flex-direction: column; background: rgba(8,18,38,.72); border: 1px solid rgba(66,255,244,.34); border-radius: 16px; overflow: hidden; box-shadow: 0 0 12px rgba(0,220,255,.10); }
        .nisa-paper-roll-guide-title { padding: 7px 8px 6px; color: #dffcff; font-weight: 700; font-size: 12px; letter-spacing: .2px; text-align: center; line-height: 1.25; }
        .nisa-paper-roll-guide-image-box { padding: 8px; background: rgba(0,0,0,.16); display: flex; justify-content: center; align-items: center; height: 132px; overflow: hidden; }
        .nisa-paper-roll-guide-image { display: block; max-width: 100%; max-height: 118px; width: auto; height: auto; object-fit: contain; }
        .nisa-paper-roll-guide-action { padding: 8px; display: flex; justify-content: center; }

        .chatbot-topics { display: flex; flex-wrap: wrap; gap: 12px; margin: 8px 0; }
        .chatbot-topic-card {

        .topic-icon { font-size: 24px; }

 .chatbot-yesno-options {
     display: grid;
     grid-template-columns: 1fr 1fr;
     gap: 10px;
     width: 100%;
     margin: 6px 0 10px;
 }
 .chatbot-yesno-card {
     -webkit-appearance: none;
     appearance: none;
     position: relative;
     overflow: hidden;
     padding: 11px 12px;
     border-radius: 18px;
     border: 1px solid rgba(0,200,255,0.45);
     background: rgba(0,102,204,0.7);
     color: #ffffff;
     cursor: pointer;
     font-family: inherit;
     font-weight: 700;
     font-size: 13px;
     letter-spacing: .2px;
     text-align: center;
     backdrop-filter: blur(10px);
     box-shadow: inset 0 1px 0 rgba(255,255,255,0.10), 0 0 14px rgba(0,150,255,0.22);

 }
 .chatbot-yesno-card::before {

    <script type="module">
        import * as THREE from 'three';
        const container = document.getElementById('three-character');
        const width = 180, height = 180;
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, width/height, 0.1, 1000);
        camera.position.set(0, 0, 3);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(width, height);
        renderer.setClearColor(0x000000, 0);
        container.appendChild(renderer.domElement);

        const geometry = new THREE.IcosahedronGeometry(1, 0);
        const material = new THREE.MeshStandardMaterial({
            color: 0x00aaff,
            emissive: 0x004466,
            roughness: 0.3,
            metalness: 0.8,
            transparent: true,
            opacity: 0.85
        });
        const orb = new THREE.Mesh(geometry, material);
        scene.add(orb);

        const edgesGeo = new THREE.EdgesGeometry(geometry);
        const edgesMat = new THREE.LineBasicMaterial({ color: 0x88ddff });
        const wireframe = new THREE.LineSegments(edgesGeo, edgesMat);
        orb.add(wireframe);

        const ringGeo = new THREE.TorusGeometry(1.2, 0.03, 32, 100);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0x00aaff, emissive: 0x0066aa });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI / 2;
        scene.add(ring);

        const particleCount = 60;
        const particleSystem = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 2.5;
            particlePositions[i*3+1] = (Math.random() - 0.5) * 2.5;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 2.5;
        }
        particleSystem.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.03 });
        const particlesField = new THREE.Points(particleSystem, particleMat);
        scene.add(particlesField);

        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(1, 2, 1);
        scene.add(dirLight);
        const backLight = new THREE.PointLight(0x2266ff, 0.5);
        backLight.position.set(0, 0, -2);
        scene.add(backLight);

        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;
            orb.rotation.y = time * 0.5;
            orb.rotation.x = Math.sin(time * 0.3) * 0.2;
            ring.rotation.z = time * 0.3;
            ring.rotation.y = time * 0.2;
            particlesField.rotation.y = time * 0.1;
            particlesField.rotation.x = time * 0.05;
            renderer.render(scene, camera);
        }
        animate();
    </script>

 <script>
        const DEEPSEEK_API_KEY = ''; // Do not store API keys in frontend. Use Cloudflare Worker.
        const KNOWLEDGE_PROXY_URL = window.NISA_CONFIG?.KNOWLEDGE_URL || './knowledge.json';

        let knowledge = {};
        async function loadKnowledge() {
            if (!KNOWLEDGE_PROXY_URL) return;
            try {
                const res = await fetch(KNOWLEDGE_PROXY_URL);
                if (!res.ok) throw new Error();
                knowledge = await res.json();
                console.log("Knowledge loaded");
            } catch(e) { console.warn("Knowledge load failed"); }
        }
        function findKnowledgeMatch(question) {
            const lower = question.toLowerCase();
            for (let [key, answer] of Object.entries(knowledge)) {
                if (lower.includes(key.toLowerCase())) return answer;
            }
            return null;
        }
        const NISA_WORKER_URL = window.NISA_CONFIG?.WORKER_URL || window.NISA_CONFIG?.DEEPSEEK_PROXY_URL || "https://nisa-deepseek-proxy.kgurun88.workers.dev";

        async function workerRequest(payload = {}, timeoutMs = 12000) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), timeoutMs);
            try {
                const response = await fetch(NISA_WORKER_URL, {
                    method: "POST",
                    signal: controller.signal,
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                clearTimeout(timer);
                if (!response.ok) throw new Error(`Worker request failed: ${response.status}`);
                return await response.json();
            } catch (err) {
                clearTimeout(timer);
                console.warn("NISA worker request failed:", err);
                return null;
            }
        }

        async function callDeepSeek(userMessage, contextHint = "", preferredLanguage = "English") {
            // NISA INDEX PIPELINE — safe adaptive layer
            // Order: locked input/context -> optional knowledge -> worker/NISA -> safety gate -> sanitized output.
            const coreInput = String(userMessage || '').trim();
            const coreContext = String(contextHint || '').trim();
            const outputLanguage = preferredLanguage || 'English';

            if (!coreInput) {
                return fallbackResponse(coreInput, outputLanguage);
            }

            // Fast local knowledge check. This does not touch translation or hard-force UI flows.
            const knowledgeMatch = findKnowledgeMatch(coreInput);
            if (knowledgeMatch) {
                return sanitizeOutput(knowledgeMatch);
            }

            let data = null;
            try {
                data = await workerRequest({
                    action: "chat",
                    message: coreInput,
                    context: coreContext,
                    preferredLanguage: outputLanguage,
                    phone: window.NISA_SESSION?.phone || "",
                    name: window.NISA_SESSION?.name || "",
                    conversationHistory: window.NISA_SESSION?.conversationHistory || []
                });
            } catch (err) {
                console.warn("NISA worker error:", err);
            }

            const nisaOutput = data?.reply || "";

            if (violatesRules(nisaOutput, coreInput)) {
                console.warn("NISA output rejected by safety gate. Fallback used.");
                return fallbackResponse(coreInput, outputLanguage);
            }

            return sanitizeOutput(nisaOutput) || fallbackResponse(coreInput, outputLanguage);
        }

        function violatesRules(output, input = "") {
            const clean = String(output || '').trim();
            if (!clean) return true;
            if (clean.length < 2) return true;
            if (clean.length > 4000) return true;
            if (/undefined|null|\[object Object\]/i.test(clean)) return true;
            if (/(\w+)(?:\s+){5,}/i.test(clean)) return true;
            if (/<\/?(script|iframe|object|embed|meta|link)[\s>]/i.test(clean)) return true;
            return false;
        }

        function sanitizeOutput(output = "") {
            return String(output || '')
                .replace(/<\/?(script|iframe|object|embed|meta|link)[^>]*>/gi, '')
                .replace(/\s{3,}/g, ' ')
                .replace(/\n{3,}/g, '\n\n')
                .trim();
        }

        function fallbackResponse(input = "", language = "English") {
            const lower = String(language || '').toLowerCase();

            }

            function sanitizeBubbleHtml(html = '') {
                const template = document.createElement('template');
                template.innerHTML = String(html || '');
                const blockedTags = new Set(['SCRIPT', 'STYLE', 'IFRAME', 'OBJECT', 'EMBED', 'META', 'LINK']);
                const allowedTags = new Set(['A', 'B', 'BR', 'CODE', 'DIV', 'EM', 'I', 'IMG', 'P', 'SPAN', 'STRONG']);
                const walker = document.createTreeWalker(template.content, NodeFilter.SHOW_ELEMENT, null);
                const toRemove = [];
                while (walker.nextNode()) {
                    const el = walker.currentNode;
                    if (blockedTags.has(el.tagName) || !allowedTags.has(el.tagName)) {
                        toRemove.push(el);
                        continue;
                    }
                    [...el.attributes].forEach(attr => {
                        const name = attr.name.toLowerCase();
                        const value = attr.value || '';
                        if (name.startsWith('on') || name === 'style') {
                            el.removeAttribute(attr.name);
                            return;
                        }
                        if (name === 'href') {
                            const safeHref = String(value).trim();
                            if (!/^(https?:|mailto:|tel:|\.\/|\.\.\/|\/)/i.test(safeHref)) {
                                el.removeAttribute('href');
                            } else {
                                el.setAttribute('rel', 'noopener noreferrer');
                                if (/^https?:/i.test(safeHref)) el.setAttribute('target', '_blank');
                            }
                            return;
                        }
                        if (name === 'src') {
                            const safeSrc = String(value).trim();
                            if (!/^(https?:|data:image\/|\.\/|\.\.\/|\/)/i.test(safeSrc)) {
                                el.removeAttribute('src');
                            }
                            return;
                        }
                        if (!['alt', 'class', 'download', 'href', 'loading', 'rel', 'src', 'target', 'title'].includes(name)) {
                            el.removeAttribute(attr.name);
                        }
                    });
                }
                toRemove.forEach(el => el.replaceWith(document.createTextNode(el.textContent || '')));
                return template.innerHTML;

            const MAX_AUTO_ATTACHMENT_BYTES = 6 * 1024 * 1024;

            function getAttachmentExtension(fileName = '') {
                const clean = String(fileName || '').trim();
                const idx = clean.lastIndexOf('.');
                return idx >= 0 ? clean.slice(idx + 1).toLowerCase() : '';
            }

            function classifyAttachmentForUpload(file) {
                const ext = getAttachmentExtension(file?.name || '');
                const mime = String(file?.type || '').toLowerCase();
                const textExts = new Set(['txt', 'csv', 'json', 'xml', 'md', 'log']);
                const officeExts = new Set(['doc', 'docx', 'xls', 'xlsx', 'ppt', 'pptx']);
                const archiveExts = new Set(['zip', 'rar', '7z', 'tar', 'gz']);
                const mediaExts = new Set(['mp4', 'mov', 'avi', 'mkv', 'webm', 'mp3', 'wav', 'm4a', 'aac']);

                if (mime.startsWith('image/')) return 'image';
                if (mime === 'application/pdf' || ext === 'pdf') return 'pdf';
                if (mime.startsWith('text/') || textExts.has(ext)) return 'text';
                if (officeExts.has(ext)) return 'office';
                if (archiveExts.has(ext)) return 'archive';
                if (mime.startsWith('video/') || mime.startsWith('audio/') || mediaExts.has(ext)) return 'media';
                return 'other';
            }

            function formatAttachmentSize(bytes = 0) {
                const size = Number(bytes || 0);
                if (size <= 0) return '0 B';
                if (size < 1024) return `${size} B`;
                if (size < 1024 * 1024) return `${(size / 1024).toFixed(1)} KB`;
                return `${(size / (1024 * 1024)).toFixed(2)} MB`;
            }

            function readFileAsDataUrl(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(String(reader.result || ''));
                    reader.onerror = () => reject(reader.error || new Error('Unable to read file.'));
                    reader.readAsDataURL(file);
                });
            }

            async function sendAttachmentForAnalysis(file) {
                const category = classifyAttachmentForUpload(file);
                const shouldInline = ['text', 'pdf', 'image'].includes(category) && file.size <= MAX_AUTO_ATTACHMENT_BYTES;
                let contentBase64 = '';
                if (shouldInline) {
                    contentBase64 = await readFileAsDataUrl(file);
                }
                return await workerRequest({
                    action: 'analyze_attachment',
                    fileName: file.name,
                    mimeType: file.type || '',
                    fileSize: file.size || 0,
                    attachmentCategoryHint: category,
                    contentBase64,
                    attachmentPrompt: 'Review this uploaded attachment for NISA customer care. If it can be processed automatically, summarize or extract the useful content briefly. If it cannot be processed confidently, set fallbackToLiveChat to true.',
                    preferredLanguage: preferredLanguage || 'English',
                    phone: customerPhone || '',
                    name: customerName || ''
                }, 25000);
            }

            function initSpeech() {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

                if (!SpeechRecognition) {
                    voiceBtn.disabled = true;
                    voiceBtn.title = 'Voice input is not supported in this browser. Please use Chrome or Edge.';
                    return;
                }

                recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = true;
                recognition.maxAlternatives = 3;
                recognition.lang = getSpeechLanguageCode();

                let finalTranscript = '';
                let interimTranscript = '';
                let voiceStartedAt = 0;
                let noSpeechRetryCount = 0;

                recognition.onstart = () => {
                    isListening = true;
                    finalTranscript = '';
                    interimTranscript = '';
                    voiceStartedAt = Date.now();
                    voiceBtn.classList.add('listening');
                    voiceBtn.classList.remove('transcribing');
                    voiceBtn.title = getVoiceHelpMessage();
                    input.placeholder = getVoiceHelpMessage();
                };

                recognition.onspeechstart = () => {
                    voiceBtn.classList.add('transcribing');
                };

                recognition.onresult = (event) => {
                    interimTranscript = '';
                    let bestFinal = '';
                    let bestConfidence = -1;

                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        const result = event.results[i];

                        if (result.isFinal) {
                            for (let j = 0; j < result.length; j++) {
                                const alternative = result[j];
                                if ((alternative.confidence || 0) > bestConfidence) {
                                    bestFinal = alternative.transcript || '';
                                    bestConfidence = alternative.confidence || 0;
                                }
                            }

                            finalTranscript += ' ' + (bestFinal || result[0]?.transcript || '');
                        } else {
                            interimTranscript += result[0]?.transcript || '';
                        }
                    }

                    const visibleTranscript = (finalTranscript || interimTranscript || '').trim();
                    if (visibleTranscript) {
                        applyTranscriptToInput(visibleTranscript);
                    }
                };

                recognition.onerror = (event) => {
                    const errorType = event?.error || '';
                    isListening = false;
                    voiceBtn.classList.remove('listening', 'transcribing');
                    input.placeholder = 'Type a message...';

                    if (errorType === 'not-allowed' || errorType === 'service-not-allowed') {
                        addMessage('Microphone access is blocked. Please allow microphone permission in your browser, then try again.', 'system');
                        return;
                    }

                    if (errorType === 'no-speech') {
                        noSpeechRetryCount += 1;
                        if (noSpeechRetryCount <= 1 && Date.now() - voiceStartedAt < 4500) {
                            try {
                                recognition.lang = getSpeechLanguageCode();
                                recognition.start();
                                return;
                            } catch (e) {}
                        }
                        addMessage(getVoiceNoSpeechMessage(), 'system');
                        return;
                    }

                    if (errorType === 'audio-capture') {
                        addMessage('I cannot access the microphone. Please check that your microphone is connected and not used by another app.', 'system');
                        return;
                    }

                    if (errorType === 'network') {
                        addMessage('Voice recognition had a network issue. Please try again, or type your message instead.', 'system');
                        return;
                    }

                    addMessage(`Voice input stopped: ${errorType || 'unknown error'}. You can try again or type your message.`, 'system');
                };

                recognition.onend = () => {
                    isListening = false;
                    voiceBtn.classList.remove('listening', 'transcribing');
                    voiceBtn.title = 'Voice command';
                    input.placeholder = 'Type a message...';

                    const cleanFinal = String(finalTranscript || input.value || '').trim();
                    if (cleanFinal) {
                        applyTranscriptToInput(cleanFinal);
                    }
                };
            }

            function cleanAssistantFiller(text = '') {
                return String(text || '')
                    .replace(/\s*(Ada apa-apa lagi yang boleh saya bantu\??\s*😊?\s*)$/i, '')
                    .replace(/\s*(Ada apa-apa lagi yang ingin anda tanyakan\??\s*😊?\s*)$/i, '')
                    .replace(/\s*(Anything else I can help with\??\s*😊?\s*)$/i, '')
                    .replace(/\s*(Is there anything else I can help with\??\s*😊?\s*)$/i, '')
                    .trim();
            }

            function normalizeAssistantTextForBubbles(text = '') {
                let cleaned = cleanAssistantFiller(text)
                    .replace(/\r\n/g, '\n')
                    .replace(/:\s*-\s+/g, ':\n- ')
                    .replace(/\.\s*-\s+/g, '.\n- ')
                    .replace(/\s+-\s+/g, '\n- ')
                    .replace(/\n\s*[•]\s+/g, '\n- ')
                    .replace(/\n{3,}/g, '\n\n')
                    .trim();

                cleaned = cleaned.replace(/(\n- [\s\S]*?)(\s+Untuk\s+senarai\s+lengkap[\s\S]*)$/i, '$1\n\n$2');
                cleaned = cleaned.replace(/(\n- [\s\S]*?)(\s+For\s+the\s+complete\s+list[\s\S]*)$/i, '$1\n\n$2');
                return cleaned;
            }

            function splitAssistantResponse(text = '') {
                const raw = normalizeAssistantTextForBubbles(text);
                if (!raw) return [''];

                const chunks = [];
                const paragraphs = raw.split(/\n\s*\n+/).map(x => x.trim()).filter(Boolean);

                function pushPlain(section) {
                    if (!section) return;
                    if (section.length <= 360) {
                        chunks.push(section);
                        return;
                    }

                    const sentences = section.match(/[^.!?。！？]+[.!?。！？]?/g) || [section];
                    let current = '';
                    for (const sentence of sentences) {
                        const trimmed = sentence.trim();
                        if (!trimmed) continue;
                        const candidate = current ? `${current} ${trimmed}` : trimmed;
                        if (candidate.length > 360 && current) {
                            chunks.push(current.trim());
                            current = trimmed;
                        } else {
                            current = candidate;
                        }
                    }
                    if (current.trim()) chunks.push(current.trim());
                }

                function pushBullets(lines) {
                    if (!lines.length) return;

                    // For better chat readability, keep each award/item as its own bubble.
                    // If the list is very long, group after several items to avoid too many bubbles.
                    if (lines.length <= 5) {
                        lines.forEach(line => chunks.push(line));
                        return;
                    }

                    let group = [];
                    for (const line of lines) {
                        group.push(line);
                        if (group.length >= 4 || group.join('\n').length >= 460) {
                            chunks.push(group.join('\n'));
                            group = [];
                        }
                    }
                    if (group.length) chunks.push(group.join('\n'));
                }

                for (const paragraph of paragraphs) {
                    const lines = paragraph.split('\n').map(x => x.trim()).filter(Boolean);
                    const bulletStart = lines.findIndex(line => /^[-•]\s+/.test(line));

                    if (bulletStart === -1) {
                        pushPlain(paragraph);
                        continue;
                    }

                    const intro = lines.slice(0, bulletStart).join('\n').trim();
                    const bulletAndAfter = lines.slice(bulletStart);
                    const bullets = bulletAndAfter.filter(line => /^[-•]\s+/.test(line));
                    const trailing = bulletAndAfter.filter(line => !/^[-•]\s+/.test(line));

                    pushPlain(intro);
                    pushBullets(bullets);
                    trailing.forEach(pushPlain);
                }

                return chunks.length ? chunks.slice(0, 12) : [raw];
            }

function normalizePreferredLanguage(value) {
                const raw = String(value || '').trim();
                const lower = raw.toLowerCase();
                if (!raw) return 'English';
                if (lower === 'bm' || lower.includes('bahasa') || lower.includes('malay') || lower.includes('melayu')) return 'Bahasa Malaysia';
                if (lower.includes('mandarin') || lower.includes('chinese') || lower.includes('中文') || lower.includes('华语') || lower.includes('華語') || lower.includes('普通话') || lower.includes('普通話')) return 'Mandarin';
                if (lower.includes('tamil') || lower.includes('தமிழ்')) return 'Tamil';
                if (lower.includes('english') || lower.includes('englidh') || lower.includes('englih') || lower.includes('englis') || lower.includes('inggeris') || lower === 'eng') return 'English';
                if (lower.includes('russian') || lower.includes('рус')) return 'Russian';
                return raw.charAt(0).toUpperCase() + raw.slice(1);
            }
 function isMalayLanguage() {
 const lower = (preferredLanguage || '').toLowerCase();
 return lower.includes('bahasa') || lower.includes('malay') || lower.includes('melayu');

            function detectLanguageSwitchRequest(value) {
                const raw = (value || '').trim();
                const lower = raw.toLowerCase().replace(/[.,!?;:]+/g, ' ').replace(/\s+/g, ' ').trim();
                if (!raw) return '';

                function languageFromText(text) {
                    if (text.includes('english') || text.includes('englidh') || text.includes('englih') || text.includes('englis') || text.includes('inggeris') || /\beng\b/.test(text)) return 'English';
                    if (text.includes('bahasa malaysia') || text.includes('bahasa melayu') || text.includes('malay') || text.includes('melayu') || /\bbm\b/.test(text)) return 'Bahasa Malaysia';
                    if (text.includes('mandarin') || text.includes('chinese') || text.includes('中文') || text.includes('华语') || text.includes('華語') || text.includes('普通话') || text.includes('普通話')) return 'Mandarin';
                    if (text.includes('tamil') || text.includes('தமிழ்')) return 'Tamil';
                    return '';
                }

                const knownDirect = languageFromText(lower);
                const wordCount = lower.split(' ').filter(Boolean).length;
                if (knownDirect && wordCount <= 5) return knownDirect;

                const switchPatterns = [
                    'switch to', 'change to', 'reply in', 'respond in', 'answer in', 'speak in', 'talk in',
                    'continue in', 'use language', 'use ', 'change language to', 'please use', 'please speak',
                    'tukar bahasa', 'ubah bahasa', 'guna bahasa', 'balas dalam', 'jawab dalam', 'gunakan bahasa',
                    '换成', '切换到', '使用', '用', 'மொழி'
                ];

                const hasSwitchIntent = switchPatterns.some(pattern => lower.includes(pattern));
                if (!hasSwitchIntent) return '';
                if (knownDirect) return knownDirect;

                // Worldwide-language support: extract the requested language after common switch phrases.
                const extractionPatterns = [
                    /(?:switch to|change to|reply in|respond in|answer in|speak in|talk in|continue in|change language to|please use|please speak|use language)\s+([\p{L}\p{N}\-\s]{2,40})/iu,
                    /(?:tukar bahasa|ubah bahasa|guna bahasa|balas dalam|jawab dalam|gunakan bahasa)\s+([\p{L}\p{N}\-\s]{2,40})/iu,
                    /(?:换成|切换到|使用|用)\s*([\p{L}\p{N}\-\s]{1,20})/iu
                ];
                for (const pattern of extractionPatterns) {
                    const match = raw.match(pattern);
                    if (match && match[1]) {
                        const candidate = match[1].replace(/[.!?,;:]+$/g, '').trim();
                        if (candidate && candidate.length <= 40) return normalizePreferredLanguage(candidate);
                    }
                }
                return '';
            }

            function isFarewellMessage(message = '') {
                const raw = String(message || '').trim();
                if (!raw) return false;

                const lower = raw
                    .toLowerCase()
                    .replace(/[.!。！]+$/g, '')
                    .replace(/\s+/g, ' ')
                    .trim();

                // Do not close if the user is asking ABOUT the word/phrase.
                const questionLike =
                    raw.includes('?') ||
                    /\b(what|meaning|means|define|explain|translate|how to say|apa maksud|maksud|terjemah|怎么说|什么意思|என்ன அர்த்தம்)\b/i.test(lower);

                if (questionLike) return false;

                // Avoid closing on long sentences that merely mention a farewell word.
                if (lower.length > 55) return false;

                const exactFarewells = new Set([
                    'bye',
                    'bye bye',
                    'goodbye',
                    'good bye',
                    'see you',
                    'see ya',
                    'see u',
                    'later',
                    'talk to you later',
                    'ttyl',
                    'ciao',
                    'adios',
                    'ok bye',
                    'okay bye',
                    'thanks bye',
                    'thank you bye',
                    'tq bye',
                    'done bye',
                    'selamat tinggal',
                    'jumpa lagi',
                    'bye terima kasih',
                    'terima kasih bye',
                    'ok bye terima kasih',
                    '再见',
                    '拜拜',
                    '下次见',
                    '谢谢 再见',
                    'நன்றி bye',
                    'பிரியாவிடை',
                    'பை',
                    'பை பை'
                ]);

                if (exactFarewells.has(lower)) return true;

                // Short natural variants only.
                return /^(thanks?|thank you|tq|terima kasih|谢谢|நன்றி)?\s*(bye|bye bye|goodbye|good bye|see you|see ya|see u|jumpa lagi|selamat tinggal|再见|拜拜|பை|பை பை)\s*(thanks?|thank you|tq|terima kasih|谢谢|நன்றி)?$/i.test(lower);
            }

                        if (cleanMessage.length < 5) {
                            serialAttempts++;
                            if (serialAttempts === 1) { addMessage(uiText('paperRollInvalidSerial1', 'Please ensure you have entered the correct Terminal Serial Number assigned to your terminal!'), 'assistant'); return; }
                            if (serialAttempts === 2) { addMessage(uiText('paperRollInvalidSerial2', "Oh, that doesn't look quite right to me. Please try again!"), 'assistant'); return; }
                            currentFlow = 'agent_confirm';
                            askYesNo(uiText('validationLiveAgentPrompt', 'You seem to be having some trouble with this step. Would you like to talk to a live agent?'));
                            return;
                        }
                        orderData.serial = normalizeSerialLocal(cleanMessage);
                        serialAttempts = 0;

                        const savedName = customerName || (localStorage.getItem('nisaCustomerName') || '');
                        const savedPhone = customerPhone || (localStorage.getItem('nisaCustomerPhone') || '');
                        if (savedName && savedPhone) {
                            orderData.name = savedName;
                            orderData.phone = normalizePhoneLocal(savedPhone);

                            if (!merchantProfile) await refreshMerchantProfile(orderData.phone);
                            const matchedOutlet = findOutletForSerial(merchantProfile, orderData.serial);
                            if (matchedOutlet) {
                                orderData.outletName = matchedOutlet.outletName || '';
                                orderData.address = matchedOutlet.address || '';
                                orderData.hours = matchedOutlet.workingHours || '';
                                orderData.email = matchedOutlet.email || '';

                                const hasCompleteOutlet = orderData.address && orderData.hours && orderData.email;
                                addMessage(formatUiText(uiText('paperRollUseRegisteredDetails', 'I will use your registered details for this request:\nContact Person: {{name}}\nContact Number: {{phone}}'), { name: orderData.name, phone: orderData.phone }), 'assistant');

                                if (hasCompleteOutlet) {
                                    paperRollStep = 7;
                                    addMessage(formatUiText(uiText('paperRollConfirmPrompt', 'Alright {{name}}, please confirm the order and your details below:\n\nSerial Number: {{serial}}\nContact Person: {{name}}\nContact Number: {{phone}}\nAddress: {{address}}\nWorking Hours: {{hours}}\nEmail Address: {{email}}\n\nType CONFIRM to place your order.'), { name: orderData.name, serial: orderData.serial, phone: orderData.phone, address: orderData.address, hours: orderData.hours, email: orderData.email }), 'assistant');
                                    return;
                                }
                            }

                            paperRollStep = orderData.address ? 5 : 4;
                            addMessage(formatUiText(uiText('paperRollUseRegisteredDetails', 'I will use your registered details for this request:\nContact Person: {{name}}\nContact Number: {{phone}}'), { name: orderData.name, phone: orderData.phone }), 'assistant');
                            addMessage(orderData.address ? uiText('paperRollAskHours', 'And what are your working hours? (eg: 9am to 6pm, Mon-Fri)') : uiText('paperRollAskAddress', 'May I also have the full address of your company/outlet? 😊'), 'assistant');
                            return;
                        }
                        paperRollStep = 2;
                        addMessage(uiText('paperRollAskContactName', 'Can I have the name of your contact person please 📝?'), 'assistant');
                        return;
                    }
                    if (paperRollStep === 2) {
                        orderData.name = cleanMessage;
                        paperRollStep = 3;
                        addMessage(uiText('paperRollAskContactPhone', "📞 What's your contact number? (eg: 012345678)"), 'assistant');
                        return;
                    }
                    if (paperRollStep === 3) {
                        if (!/^\d{9,11}$/.test(cleanMessage)) {
                            phoneAttempts++;
                            if (phoneAttempts === 1) { addMessage(uiText('paperRollInvalidPhone1', 'Are you sure you got that right? Please check your number and try again!'), 'assistant'); return; }
                            if (phoneAttempts === 2) { addMessage(uiText('paperRollInvalidPhone2', 'No, that still looks a bit off to me. Please refer to the example below and type in your number.\n\neg: 0161234567'), 'assistant'); return; }
                            currentFlow = 'agent_confirm';
                            askYesNo(uiText('validationLiveAgentPrompt', 'You seem to be having some trouble with this step. Would you like to talk to a live agent?'));
                            return;
                        }
                        orderData.phone = cleanMessage;
                        if (orderData.name) {
                            try {
                                localStorage.setItem('nisaCustomerName', orderData.name);
                                localStorage.setItem('nisaCustomerPhone', orderData.phone);
                            } catch(e) {}
                        }
                        paperRollStep = 4;
                        phoneAttempts = 0;
                        addMessage(uiText('paperRollAskAddress', 'May I also have the full address of your company/outlet? 😊'), 'assistant');
                        return;
                    }
                    if (paperRollStep === 4) {
                        orderData.address = cleanMessage;
                        paperRollStep = 5;
                        addMessage(uiText('paperRollAskHours', 'And what are your working hours? (eg: 9am to 6pm, Mon-Fri)'), 'assistant');
                        return;
                    }
                    if (paperRollStep === 5) {
                        orderData.hours = cleanMessage;
                        paperRollStep = 6;
                        addMessage(uiText('paperRollAskEmail', 'Perfect, and what is your email address?'), 'assistant');
                        return;
                    }
                    if (paperRollStep === 6) {
                        if (!/^\S+@\S+\.\S+$/.test(cleanMessage)) {
                            emailAttempts++;
                            if (emailAttempts === 1) { addMessage(uiText('paperRollInvalidEmail1', 'That email address seems a bit off, please try again!'), 'assistant'); return; }
                            if (emailAttempts === 2) { addMessage(uiText('paperRollInvalidEmail2', "I don't think that's right either. Please retry and follow this format:\n\neg: user@provider.com"), 'assistant'); return; }
                            currentFlow = 'agent_confirm';
                            askYesNo(uiText('validationLiveAgentPrompt', 'You seem to be having some trouble with this step. Would you like to talk to a live agent?'));
                            return;
                        }
                        orderData.email = cleanMessage;
                        paperRollStep = 7;
                        emailAttempts = 0;
                        addMessage(formatUiText(uiText('paperRollConfirmPrompt', 'Alright {{name}}, please confirm the order and your details below:\n\nSerial Number: {{serial}}\nContact Person: {{name}}\nContact Number: {{phone}}\nAddress: {{address}}\nWorking Hours: {{hours}}\nEmail Address: {{email}}\n\nType CONFIRM to place your order.'), { name: orderData.name, serial: orderData.serial, phone: orderData.phone, address: orderData.address, hours: orderData.hours, email: orderData.email }), 'assistant');
                        return;
                    }
                    if (paperRollStep === 7) {
                        if (msg.includes('confirm')) {
                            const saveResult = await savePaperRollOutletMemory();
                            if (saveResult && saveResult.ok === false && saveResult.reason === 'duplicate_serial_other_merchant') {
                                addMessage(saveResult.message || 'This terminal serial appears to be linked to an existing record. For security, please contact PAYSYS for confirmation.', 'assistant');
                                return;
                            }
                            addMessage(formatUiText(uiText('paperRollSuccessMessage', 'Great! Your order has been placed successfully. Please find the details below:\n\nSerial Number: {{serial}}\nContact Person: {{name}}\nContact Number: {{phone}}\nAddress: {{address}}\nWorking Hours: {{hours}}\nEmail Address: {{email}}\n\nTerms Of Delivery:\nWithin Klang Valley - 3 working days.\nOutside Klang Valley - 5 working days.\n\n😉 Thank you for completing the request through our bot. You will receive an email notification at the email address provided. Our agent will respond to your email with a ticket number within the same day.'), { name: orderData.name, serial: orderData.serial, phone: orderData.phone, address: orderData.address, hours: orderData.hours, email: orderData.email }), 'assistant');
                            currentFlow = null;
                            paperRollStep = 0;
                            return;
                        }
                        addMessage(uiText('paperRollTypeConfirm', 'Please type CONFIRM to place your order.'), 'assistant');
                        return;
                    }
                }

                const loadingMsg = addMessage('', 'assistant', true);
                let reply = await callDeepSeek(message, currentFlow || '', preferredLanguage || 'English');
                loadingMsg.remove();
                addMessage(reply, 'assistant');
                conversationHistory.push({ role: 'assistant', content: reply });
                if (conversationHistory.length > 20) conversationHistory = conversationHistory.slice(-20);
                syncNisaSession();
            }
            function buildQuickReplies() {
                quickRepliesDiv.innerHTML = '';
                quickRepliesDiv.classList.remove('fade-in');
            }

            if (typeof Tawk_API !== 'undefined' && Tawk_API && Tawk_API.showWidget) {
                liveChatBtn.addEventListener('click', () => { simulateLiveAgentHandoff('User clicked Live Chat button'); });
            } else {
                liveChatBtn.addEventListener('click', () => { simulateLiveAgentHandoff('User clicked Live Chat button'); });
            }

            function resetToTopicCards() {
                // Reset only the active flow/action. Keep previous conversation visible.
                if (!chatActive) {
                    addMessage(uiText('chatEndedMessage', 'Chat ended. Start a new conversation if you need more help.'), 'system');
                    return;
                }
                if (!onboardingComplete) {
                    addMessage(uiText('completeDetailsFirst', 'Please complete the phone number and name step first before choosing a topic.'), 'system');
                    return;
                }

                const alreadyShowingTopics = topicsVisible && hasVisibleTopicCards() && !currentFlow;

                currentFlow = null;
                paperRollStep = 0;
                orderData = {};
                serialAttempts = 0;
                phoneAttempts = 0;
                emailAttempts = 0;
                removeYesNoOptions();
                quickRepliesDiv.classList.remove('fade-in');
                input.value = '';
                sendBtn.disabled = true;

                if (alreadyShowingTopics) {
                    refreshTopicCardsIfVisible();
                    const existingTopics = messagesDiv.querySelector('.chatbot-topics');
                    if (existingTopics) existingTopics.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    return;
                }

                addMessage(uiText('homeReturnMessage', 'Returning to the topic menu. Please choose one of the options below.'), 'assistant');
                showTopics();
                buildQuickReplies();
            }

            function resetConversation() {
                chatActive = true;
                conversationHistory = [];
                currentFlow = null;
                paperRollStep = 0;
                orderData = {};
                serialAttempts = 0;
                phoneAttempts = 0;
                emailAttempts = 0;
                onboardingComplete = false;
                onboardingStep = 'language';
                onboardingPhoneAttempts = 0;
                customerPhone = '';
                customerName = '';
                merchantProfile = null;
                syncNisaSession();
                languageSelected = false;
                preferredLanguage = 'English';
                translatedUi = DEFAULT_UI;
                messagesDiv.innerHTML = '';
                quickRepliesDiv.classList.remove('fade-in');
                input.disabled = false;
                sendBtn.disabled = true;
                voiceBtn.disabled = false;
                attachBtn.disabled = false;
                endChatBtn.disabled = false;
                addMessage(DEFAULT_UI.welcomeTitle, "assistant");
                addMessage(DEFAULT_UI.languagePrompt, "assistant");
                buildQuickReplies();
            }

            function createSmokeTrail(x, y) {
                for (let i = 0; i < 8; i++) {
                    const smoke = document.createElement('div'); smoke.className = 'smoke-particle';
                    const size = 20 + Math.random() * 30;
                    smoke.style.width = size + 'px'; smoke.style.height = size + 'px';
                    smoke.style.left = (x + (Math.random() - 0.5) * 60) + 'px';
                    smoke.style.top = (y + (Math.random() - 0.5) * 40) + 'px';
                    smoke.style.animationDelay = (Math.random() * 0.3) + 's';
                    document.body.appendChild(smoke);
                    setTimeout(() => smoke.remove(), 1000);
                }
            }

            function showCSAT() {
                let rating = 8;

                const existingOverlay = windowEl.querySelector('.csat-overlay');
                if (existingOverlay) existingOverlay.remove();

                const overlay = document.createElement('div');
                overlay.className = 'csat-overlay';
                overlay.innerHTML = `
                    <div class="csat-card">
                        <h4>How was your experience?</h4>
                        <div class="neon-slider-container">
                            <input type="range" min="0" max="10" value="8" class="neon-slider" id="csatSlider">
                            <div class="rating-value" id="ratingValue">8 / 10</div>
                            <div class="rating-labels">
                                <span>😞</span><span>😐</span><span>😊</span><span>😍</span>
                            </div>
                        </div>
                        <textarea class="csat-comment" placeholder="Any additional feedback? (optional)" rows="2"></textarea>
                        <button class="csat-submit">Submit</button>
                    </div>
                `;
                windowEl.appendChild(overlay);

                const slider = overlay.querySelector('#csatSlider');
                const ratingDisplay = overlay.querySelector('#ratingValue');
                slider.addEventListener('input', () => {
                    rating = parseInt(slider.value);
                    ratingDisplay.textContent = rating + ' / 10';
                });

                const submitBtn = overlay.querySelector('.csat-submit');
                submitBtn.addEventListener('click', () => {
                    const comment = overlay.querySelector('.csat-comment').value;
                    console.log(`CSAT: ${rating}, comment: ${comment}`);

                    // Futuristic thank-you state. It stays longer before closing.
                    overlay.innerHTML = `
                        <style>
                            .future-thanks-card {
                                position: relative;
                                overflow: hidden;
                                background: radial-gradient(circle at 50% 0%, rgba(0,220,255,0.24), rgba(20,25,50,0.98) 48%, rgba(4,8,20,0.98) 100%);
                                border: 1px solid rgba(0,240,255,0.75);
                                border-radius: 34px;
                                padding: 26px 22px 24px;
                                width: 90%;
                                max-width: 360px;
                                text-align: center;
                                box-shadow: 0 0 28px rgba(0,200,255,0.35), 0 0 70px rgba(0,80,255,0.22), inset 0 0 35px rgba(0,180,255,0.10);
                                animation: futureCardReveal 0.65s cubic-bezier(.2,.9,.2,1) both, futureFloat 3.2s ease-in-out infinite;
                            }
                            .future-thanks-card::before {
                                content: '';
                                position: absolute;
                                inset: -2px;
                                background: conic-gradient(from 0deg, transparent, rgba(0,255,255,0.9), rgba(120,80,255,0.8), transparent, rgba(0,255,180,0.75), transparent);
                                opacity: 0.32;
                                animation: futureSpin 4s linear infinite;
                                pointer-events: none;
                            }
                            .future-thanks-card::after {
                                content: '';
                                position: absolute;
                                inset: 1px;
                                border-radius: 32px;
                                background: linear-gradient(180deg, rgba(255,255,255,0.05), transparent 45%);
                                pointer-events: none;
                            }
                            .future-thanks-inner { position: relative; z-index: 2; }
                            .future-core {
                                width: 86px;
                                height: 86px;
                                margin: 0 auto 14px;
                                border-radius: 50%;
                                display: grid;
                                place-items: center;
                                color: #eaffff;
                                font-size: 38px;
                                background: radial-gradient(circle, rgba(255,255,255,0.95), rgba(0,220,255,0.7) 30%, rgba(0,80,255,0.18) 60%, transparent 70%);
                                box-shadow: 0 0 22px #00eaff, 0 0 55px rgba(0,180,255,0.8);
                                animation: futurePulse 1.5s ease-in-out infinite;
                            }
                            .future-title {
                                margin: 0;
                                font-size: 1.35rem;
                                letter-spacing: 0.6px;
                                color: #ffffff;
                                text-shadow: 0 0 10px rgba(0,230,255,0.9), 0 0 22px rgba(0,120,255,0.6);
                            }
                            .future-subtitle {
                                margin: 9px auto 0;
                                max-width: 285px;
                                color: #cceeff;
                                font-size: 13px;
                                line-height: 1.5;
                            }
                            .future-status {
                                margin: 16px auto 0;
                                display: inline-flex;
                                align-items: center;
                                gap: 8px;
                                padding: 7px 14px;
                                border-radius: 999px;
                                color: #9fffee;
                                font-size: 11px;
                                letter-spacing: 1.2px;
                                text-transform: uppercase;
                                background: rgba(0,255,220,0.10);
                                border: 1px solid rgba(0,255,220,0.35);
                                box-shadow: inset 0 0 12px rgba(0,255,220,0.10), 0 0 16px rgba(0,255,220,0.16);
                            }
                            .future-dot {
                                width: 7px;
                                height: 7px;
                                border-radius: 50%;
                                background: #00ffcc;
                                box-shadow: 0 0 8px #00ffcc, 0 0 18px #00ffcc;
                                animation: futureBlink 1s infinite;
                            }
                            .future-scanline {
                                position: absolute;
                                left: 0;
                                right: 0;
                                top: -30%;
                                height: 26%;
                                background: linear-gradient(180deg, transparent, rgba(0,255,255,0.15), transparent);
                                animation: futureScan 2.3s ease-in-out infinite;
                                z-index: 1;
                                pointer-events: none;
                            }
                            .future-particle {
                                position: absolute;
                                width: 4px;
                                height: 4px;
                                border-radius: 50%;
                                background: #8ffcff;
                                box-shadow: 0 0 10px #00eaff, 0 0 22px rgba(0,170,255,0.8);
                                pointer-events: none;
                                z-index: 3;
                                animation: futureParticleBurst 1.8s ease-out forwards;
                            }
                            @keyframes futureCardReveal {
                                from { opacity: 0; transform: translateY(18px) scale(0.86); filter: blur(10px); }
                                to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
                            }
                            @keyframes futureFloat {
                                0%, 100% { transform: translateY(0); }
                                50% { transform: translateY(-5px); }
                            }
                            @keyframes futureSpin {
                                to { transform: rotate(360deg); }
                            }
                            @keyframes futurePulse {
                                0%, 100% { transform: scale(1); filter: brightness(1); }
                                50% { transform: scale(1.08); filter: brightness(1.25); }
                            }
                            @keyframes futureBlink {
                                0%, 100% { opacity: 1; }
                                50% { opacity: 0.35; }
                            }
                            @keyframes futureScan {
                                0% { transform: translateY(0); opacity: 0; }
                                20% { opacity: 1; }
                                100% { transform: translateY(520%); opacity: 0; }
                            }
                            @keyframes futureParticleBurst {
                                0% { transform: translate(0,0) scale(0.7); opacity: 1; }
                                70% { opacity: 0.95; }
                                100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
                            }
                        </style>
                        <div class="future-thanks-card">
                            <div class="future-scanline"></div>
                            <div class="future-thanks-inner">
                                <div class="future-core">✓</div>
                                <h4 class="future-title">Feedback Received</h4>
                                <p class="future-subtitle">
                                    Thank you for connecting with NISA. Your session has been safely closed and archived.
                                </p>
                                <div class="future-status"><span class="future-dot"></span>Session Complete</div>
                            </div>
                        </div>
                    `;

                    const card = overlay.querySelector('.future-thanks-card');
                    if (card) {
                        for (let i = 0; i < 34; i++) {
                            const particle = document.createElement('span');
                            particle.className = 'future-particle';
                            const angle = Math.random() * Math.PI * 2;
                            const distance = 70 + Math.random() * 170;
                            particle.style.left = '50%';
                            particle.style.top = '50%';
                            particle.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                            particle.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
                            particle.style.animationDelay = (Math.random() * 0.45) + 's';
                            card.appendChild(particle);
                        }
                    }

                    const rect = windowEl.getBoundingClientRect();
                    createSmokeTrail(rect.left + rect.width / 2, rect.top + rect.height / 2);

                    // Longer thank-you display before the closing animation.
                    setTimeout(() => {
                        windowEl.classList.add('poof');
                    }, 2200);

                    // Close and STAY closed. It will only reopen from the floating chat button.
                    setTimeout(() => {
                        overlay.remove();
                        closeChatWindow(false);
                    }, 3600);
                });
            }

            function endChat() {
                if (!chatActive) return;

                // Exit fullscreen first so the CSAT is visible and the fullscreen state cannot get stuck.
                if (isFullscreen) exitFullscreen();

                chatActive = false;
                input.disabled = true;
                sendBtn.disabled = true;
                voiceBtn.disabled = true;
                attachBtn.disabled = true;
                endChatBtn.disabled = true;
                quickRepliesDiv.classList.remove('fade-in');

                showCSAT();
            }
            endChatBtn.addEventListener('click', endChat);

            trigger.addEventListener('click', () => {
                if (!isOpen) {
                    if (isFullscreen) exitFullscreen();
                    windowEl.classList.add('open');
                    trigger.classList.add('open');
                    isOpen = true;
                    if (!chatActive || messagesDiv.children.length === 0) {
                        resetConversation();
                    }
                    setTimeout(() => {
                        if (messagesDiv && messagesDiv.children.length === 0) resetConversation();
                    }, 50);
                } else {
                    closeChatWindow();
                }
            });

            closeBtn.addEventListener('click', () => {
                closeChatWindow();
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && isFullscreen) {
                    exitFullscreen();
                }
            });


            homeBtn.addEventListener('click', () => {
                // Home resets only the current flow and brings topic cards back.
                // It does not delete previous conversation messages.
                resetToTopicCards();
            });

            sendBtn.addEventListener('click', async () => {
                if (!chatActive) return;
                const text = input.value.trim();
                if (!text) return;
                const wasTopicsVisible = topicsVisible;
                const isLanguageSwitch = !!detectLanguageSwitchRequest(text);
                await handleUserMessage(text);
                input.value = '';
                updateChatInputScroll();
                sendBtn.disabled = true;
                if (wasTopicsVisible && !isLanguageSwitch && !currentFlow) hideTopics();
            });
            input.addEventListener('input', () => { sendBtn.disabled = input.value.trim() === ''; updateChatInputScroll(); });
            input.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn.click(); } });
            messagesDiv.addEventListener('click', (e) => {
 const yesNoBtn = e.target.closest('.chatbot-yesno-card');
 if (yesNoBtn && chatActive) {
 const answer = yesNoBtn.dataset.yesno;
 removeYesNoOptions();
 handleUserMessage(answer);
 return;
 }
 const card = e.target.closest('.chatbot-topic-card');
                if (card && topicsVisible && chatActive) {
                    const originalTitle = card.dataset.topic || '';
                    const displayTitle = card.querySelector('.topic-title')?.textContent?.trim() || originalTitle;
                    if (!originalTitle) return;
                    addMessage(displayTitle, 'user');
                    if (originalTitle.toLowerCase() === 'paper roll') {
                        startPaperRollFlow();
                    } else if (originalTitle.toLowerCase() === 'terminal help') {
                        hideTopics();
                        currentFlow = 'terminal_help';
                        addMessage(uiText('terminalHelpMessage', 'I can provide general terminal guidance. For account-specific terminal checks, refund, settlement, void, reversal, transaction status, or terminal replacement, please use Live Chat.'), 'assistant');
                    } else if (originalTitle.toLowerCase() === 'live chat') {
                        hideTopics();
                        simulateLiveAgentHandoff('User selected Live Chat from topic menu');
                    } else if (originalTitle.toLowerCase() === 'general inquiries') {
                        startGeneralInquiriesFlow();
                    }
                }
 });
 buildQuickReplies();

            // NISA startup safety net:
            // buildWidget() creates the chat shell, but resetConversation() creates the first bubbles.
            // If the window is already open/fullscreen or the trigger click is bypassed, messagesDiv stays blank.
            setTimeout(() => {
                if (messagesDiv && messagesDiv.children.length === 0) {
                    resetConversation();
                }
            }, 0);
        }
        loadKnowledge().then(() => buildWidget());
    </script>
 <script>
 // Basic UI deterrents only. This does NOT secure or hide source code on public hosting.
 document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
 document.addEventListener('keydown', function(e) {
   const key = (e.key || '').toLowerCase();
   if (key === 'f12' ||
       (e.ctrlKey && e.shiftKey && ['i','j','c'].includes(key)) ||
       (e.ctrlKey && key === 'u')) {
     e.preventDefault();
     e.stopPropagation();
     return false;
   }
 }, true);
 </script>
